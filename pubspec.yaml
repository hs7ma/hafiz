name: hafiz
description: تطبيق حافظ — تنظيم حضور وحفظ القرآن في حلقات المساجد
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  go_router: ^17.0.0
  flutter_svg: ^2.2.3
  google_fonts: ^6.3.2
  intl: ^0.20.2
  just_audio: ^0.10.6
  # تشغيل الصوت على Windows (just_audio وحده لا يدعمه)
  just_audio_media_kit: ^2.1.0
  media_kit_libs_windows_audio: any
  uuid: ^4.6.0
  shared_preferences: ^2.5.3
  http: ^1.4.0
  connectivity_plus: ^6.1.4
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  supabase_flutter: ^2.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/brand/ic_launcher.png
  adaptive_icon_background: "#1F4D3A"
  adaptive_icon_foreground: assets/brand/ic_launcher_foreground.png
  adaptive_icon_foreground_inset: 16

flutter:
  uses-material-design: true
  assets:
    - assets/svg/
    - assets/brand/
    - assets/quran/quran_tanzil_uthmani.json
    - assets/quran/tafsir_muyassar.json
