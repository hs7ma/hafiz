server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Explicit robots.txt for Meta / search crawlers (do not SPA-fallback)
  location = /robots.txt {
    default_type text/plain;
    add_header Content-Type "text/plain; charset=utf-8";
    try_files $uri =404;
  }

  # Disable byte-range for HTML so Meta scrapers get 200, not 206
  location = / {
    max_ranges 0;
    try_files /index.html =404;
  }

  location = /index.html {
    max_ranges 0;
  }

  # APK downloads
  location ~* \.apk$ {
    default_type application/vnd.android.package-archive;
    add_header Content-Disposition 'attachment';
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
